<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Juan Carlos Frias Alfonso">
        <meta name="description" content="Guaguatime RD es una aplicacion web que permite escoger rutas de transporte publico en la ciudad de Santo Domingo, Republica Dominicana.">
        <meta name="keywords" content="guaguatime, guagua, transporte publico, santo domingo, republica dominicana">
        <title>Guaguatime RD - Inicio</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" href="img/favicon.ico" type="image/x-icon">
    </head>
    <body>
                <header>
            <div class="header">
                <img src="img/logo.png" height="128" alt="Logo de GuaguaTime RD" class="logo" title="logo">
               
            </div>
            <div class="nav">
                <nav aria-label="Navegación principal">
                    <a href="index.html">Inicio</a>
                    <a href="calcular-ruta.html">Buscar Ruta</a>
                    <a href="rutas-favoritas.html">Rutas Favoritas</a>
                    <a href="contacto.html">Contacto</a>
                </nav>
            </div>
        </header>
        <main>
            <section class="calcular-section">
                <h2>📬 Contacto</h2>
                <form onsubmit="enviarContacto(event)">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required>

                    <label for="email">Correo:</label>
                    <input type="email" id="email" placeholder="tu@email.com" required>

                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" rows="5" placeholder="Escribe tu mensaje..." required></textarea>

                    <br>
                    <button type="submit" class="btn-calcular">Enviar 📨</button>
                </form>
                <p id="msg-enviado" style="display:none; color:green; font-weight:bold; margin-top:10px;">✅ ¡Mensaje enviado! Gracias.</p>
            </section>
        </main>
                <footer>
            <p>© 2026 GuaguaTime RD &mdash; Juan Carlos Frias A. </p>
        </footer>
        <script type="module" src="script.js"></script>
    </body>
</html>
